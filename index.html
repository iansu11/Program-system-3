<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解題系統 V58 (新分頁極速版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-page-light: #f3f4f6;
            --bg-pane-light: #e0e0e0;   
            --text-pane-light: #1f2937; 
            --bg-pane-dark: #1e1e1e;    
            --text-pane-dark: #e0e0e0;  
            --bg-header-blue: #1e3a8a;  
            --bg-card: #ffffff;
            --accent: #3b82f6;
            --border-light: #cccccc; 
            --border-dark: #333;
            --success: #10b981;
            --fail: #ef4444;
            --warning: #f59e0b;
            --ai-color: #8b5cf6;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-page-light);
            color: #333;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        body.resizing { cursor: row-resize !important; user-select: none; }
        body.resizing iframe { pointer-events: none; }

        /* === 畫面 1: 單純登入頁面 === */
        #view-login {
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            text-align: center;
            z-index: 1000;
        }

        /* === 畫面 2: 題庫大廳 === */
        #view-portal {
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            text-align: center;
            z-index: 1000;
            overflow-y: auto;
        }

        .portal-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 50px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 90%;
            margin: 20px 0;
        }

        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .bank-btn {
            background: white;
            color: #1e3a8a;
            padding: 25px 20px;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .bank-btn:hover {
            transform: translateY(-5px) scale(1.02);
            background: var(--accent);
            color: white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .bank-desc { font-size: 0.85rem; font-weight: normal; opacity: 0.8; }

        .auth-input {
            width: 100%; margin-bottom: 15px; padding: 15px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; font-size: 1.1rem;
        }
        .auth-input::placeholder { color: #bbb; }
        .auth-input:focus { outline: 2px solid #60a5fa; background: rgba(0,0,0,0.5); }

        /* === Components === */
        button { cursor: pointer; transition: 0.2s; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; font-weight: bold; font-size: 0.9rem; display: inline-flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-sm { padding: 7px 14px; font-size: 0.85rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-outline { background: transparent; border: 1px solid #999; color: #555; }
        .btn-outline:hover { background: rgba(0,0,0,0.05); color: #000; border-color: #666; }
        .header-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; }
        .btn-copy { background-color: #375a7f; color: white; }
        .btn-reset { background-color: #6c757d; color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--fail); color: white; }
        .btn-warning { background: var(--warning); color: #1e1e1e; }
        .btn-ai { background: var(--ai-color); color: white; } 

        .page-header {
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; border-bottom: 1px solid var(--border-light); padding-bottom: 15px; flex-shrink: 0;
            flex-wrap: wrap; gap: 15px; 
        }

        #view-categories { padding: 40px; max-width: 1400px; margin: 0 auto; width: 100%; overflow-y: auto; display: none; }
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; }
        @media (max-width: 1100px) { .cat-grid { grid-template-columns: repeat(2, 1fr); } }

        .cat-card {
            background: var(--bg-card); border: 1px solid var(--border-light); padding: 25px;
            border-radius: 12px; cursor: pointer; text-align: center; position: relative;
            transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; justify-content: center; min-height: 140px;
            box-shadow: var(--card-shadow);
        }
        .cat-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .cat-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 8px; color: #1f2937; }
        .cat-actions { position: absolute; top: 10px; right: 10px; display: none; gap:5px; }
        .cat-card:hover .cat-actions { display: flex; }

        #view-problem-list { padding: 40px; max-width: 900px; margin: 0 auto; width: 100%; overflow-y: auto; display: none; }
        .prob-list-container { display: flex; flex-direction: column; gap: 12px; }
        .prob-item {
            background: var(--bg-card); border: 1px solid var(--border-light); padding: 18px 25px;
            border-radius: 8px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s; box-shadow: var(--card-shadow);
        }
        .prob-item:hover { background: #fff; border-color: var(--accent); transform: translateX(5px); }
        .prob-title { font-size: 1.1rem; font-weight: 600; color: #1f2937; }
        .prob-desc-preview { font-size: 0.85rem; color: #6b7280; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 400px; }
        .prob-actions { display: flex; gap: 5px; opacity: 0; transition: opacity 0.2s; align-items: center; }
        .prob-item:hover .prob-actions { opacity: 1; }
        .prob-btn-icon { background: transparent; border: none; font-size: 1.2rem; padding: 6px 10px; cursor: pointer; transition: 0.2s; border-radius: 4px; }
        .prob-edit-btn { color: #6b7280; }
        .prob-edit-btn:hover { color: var(--accent); background: rgba(59, 130, 246, 0.1); }
        .prob-del-btn { color: #9ca3af; }
        .prob-del-btn:hover { color: var(--fail); background: rgba(239, 68, 68, 0.1); }
        .sort-mode .cat-card, .sort-mode .prob-item { border: 2px dashed var(--accent); cursor: grab; background: #eff6ff; }
        .sort-mode .cat-card *, .sort-mode .prob-item * { pointer-events: none; }
        .sort-mode .cat-card:active, .sort-mode .prob-item:active { cursor: grabbing; }
        .dragging { opacity: 0.5; border: 2px solid var(--warning) !important; background: #fffbf0 !important; }
        .sort-mode .cat-actions, .sort-mode .prob-actions { display: none !important; }

        #view-workspace { display: none; height: 100%; flex-direction: column; background: var(--bg-page-light); }
        .ws-header { height: 60px; background: var(--bg-header-blue); border-bottom: 1px solid rgba(0,0,0,0.1); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; color: white; z-index: 10; }
        .ws-container { display: flex; flex: 1; overflow: hidden; }
        .pane-left { flex: 1; background: var(--bg-pane-light); border-right: 1px solid #ccc; padding: 30px; overflow-y: auto; min-width: 250px; }
        .pane-right { flex: 2; display: flex; flex-direction: column; background: var(--bg-pane-dark); color: var(--text-pane-dark); min-width: 400px; position: relative; }
        #editor { flex: 1; font-size: 16px; min-height: 100px; }
        .resizer-bar { height: 8px; background: #121212; cursor: row-resize; z-index: 100; }
        .console-area { height: 200px; background: #151515; display: flex; flex-direction: column; flex-shrink: 0; }
        #outputLogs { flex: 1; padding: 15px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 0.9rem; color: #ccc; }

        #view-admin { display: none; height: 100%; flex-direction: column; background: var(--bg-page-light); }
        .admin-toolbar { height: 50px; background: var(--bg-header-blue); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; color: white; }
        .admin-content-wrapper { display: flex; flex: 1; overflow: hidden; }
        
        .admin-col-left { flex: 0 0 35%; max-width: 35%; display: flex; flex-direction: column; border-right: 1px solid #ccc; padding: 25px; background: var(--bg-pane-light); color: var(--text-pane-light); overflow-y: auto; box-sizing: border-box; }
        .admin-col-left input, .admin-col-left textarea { background: var(--bg-pane-light); color: #333; border: 1px solid #999; }
        .admin-col-left input:focus, .admin-col-left textarea:focus { background: #e8e8e8; outline: 2px solid var(--accent); }
        .admin-col-right { flex: 1; display: flex; flex-direction: column; background: #1a1a1a; min-width: 0; color: #e0e0e0; }
        .admin-row-top { flex: 2; display: flex; flex-direction: column; padding: 20px; background: #1e1e1e; min-height: 100px; }
        .admin-row-bottom { flex: 1; display: flex; flex-direction: column; padding: 0; background: #151515; flex-shrink: 0; height: auto; min-height: 100px; }
        .admin-header-row { position: sticky; top: 0; background: #151515; z-index: 5; padding: 8px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        #adminTestCases { padding: 20px; overflow-y: auto; flex: 1; }
        .admin-label { color: #555; font-size: 0.9rem; margin-bottom: 5px; display: block; font-weight: 600; }
        .admin-col-right textarea { background: #252526; color: #fff; border: 1px solid #444; }
        .admin-col-right .tc-item { background: #1e1e1e; border: 1px solid #333; border-left: 3px solid var(--warning); padding:10px; margin-bottom:8px; border-radius:4px; }
        .admin-col-right .tc-item textarea { background: #151515; border: 1px solid #444; min-height: 38px; max-height: 130px; resize: vertical; overflow-y: auto; }

        /* === 提示浮窗 === */
        #updateToast {
            display: none; 
            position: fixed; 
            bottom: 25px; 
            right: 25px; 
            background: linear-gradient(135deg, #3b82f6 0%, #1e3a8a 100%);
            color: white; 
            padding: 18px 24px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
            z-index: 9999;
            align-items: center;
            gap: 15px;
            animation: slideIn 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .modal-box { background: #1e1e1e; color: #e0e0e0; padding: 25px; width: 400px; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; gap: 15px; }
        .hist-item { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; }
        .hist-item.active { border-left: 3px solid var(--accent); background: #222; }
    </style>
</head>
<body>

<div id="view-login">
    <div class="portal-container" style="max-width: 450px; padding: 50px 40px;">
        <h1 style="font-size: 2.8rem; margin-bottom: 10px; letter-spacing: 2px;">🚀 解題系統</h1>
        <p style="font-size: 1.1rem; opacity: 0.9; margin-bottom: 30px;">請登入或註冊您的帳號</p>
        <div style="text-align: left;">
            <input type="email" id="emailInput" class="auth-input" placeholder="📧 電子郵件信箱">
            <input type="password" id="passwordInput" class="auth-input" placeholder="🔑 密碼 (至少 6 個字元)">
            <div style="display:flex; gap:15px; justify-content:center; margin-top: 20px;">
                <button class="btn btn-success" style="flex:1; padding: 15px; font-size: 1.1rem;" onclick="loginWithEmail()">登入系統</button>
                <button class="btn btn-outline" style="flex:1; color:white; border-color:white; padding: 15px; font-size: 1.1rem;" onclick="registerWithEmail()">註冊新帳號</button>
            </div>
        </div>
    </div>
</div>

<div id="view-portal">
    <div class="portal-container">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.2);">
            <div style="text-align:left;">
                <div style="font-size:0.9rem; color:#ccc;">目前登入身分：</div>
                <div id="user-name" style="font-weight:bold; font-size:1.3rem; color:white;"></div>
            </div>
            <button class="btn btn-outline btn-sm" style="color:white; border-color:white;" onclick="logout()">登出系統</button>
        </div>
        <h2 style="font-size: 2rem; margin-bottom: 30px; letter-spacing: 1px;">請選擇題庫進入</h2>
        <div class="portal-grid">
            <button class="bank-btn" onclick="fetchAndLoadBank('program-1.json', '📚 114-1 程式設計')">
                <span>📚 114-1 程式設計</span>
                <span class="bank-desc">內容包含基礎與進階練習</span>
            </button>
            <button class="bank-btn" onclick="fetchAndLoadBank('program-oop.json', '🏆 114-2 物件導向')">
                <span>🏆 114-2 物件導向</span>
                <span class="bank-desc">進階 C++ 與 OOP 實作</span>
            </button>
            <button class="bank-btn" onclick="fetchAndLoadBank('advanced.json', '🔥 進階挑戰區')">
                <span>🔥 進階挑戰區</span>
                <span class="bank-desc">適合想挑戰極限的同學</span>
            </button>
        </div>
    </div>
</div>

<div id="view-categories">
    <div class="page-header">
        <div style="display:flex; align-items:center; gap:15px;">
            <button class="btn btn-outline" onclick="backToPortal()">🏠 回大廳</button>
            <h2 id="currentBankName" style="margin:0; color:var(--bg-header-blue);">📂 題庫內容</h2>
        </div>
        <div style="display:flex; gap:10px;">
            <button id="catSortBtn" class="btn btn-outline" onclick="toggleCatSortMode()">⇅ 排序</button>
            <button class="btn btn-warning" onclick="resetCurrentBank()">🔄 強制刷新</button>
            <button class="btn btn-primary" onclick="createCategory()">+ 分類</button>
        </div>
    </div>
    <div id="groupedCategoryContainer"></div>
</div>

<div id="view-problem-list">
    <div class="page-header">
        <div style="display:flex; align-items:center; gap:15px;">
            <button class="btn btn-outline" onclick="backToCategories()">⬅️ 返回</button>
            <h2 id="currentCatTitle" style="margin:0; color:var(--accent);">題目清單</h2>
        </div>
        <div style="display:flex; gap:10px;">
            <button id="probSortBtn" class="btn btn-outline" onclick="toggleProbSortMode()">⇅ 排序</button>
            <button class="btn btn-primary" onclick="createProblemInCat()">+ 新增題目</button>
        </div>
    </div>
    <div id="probListContainer" class="prob-list-container"></div>
    <div id="emptyMsg" style="text-align:center; color:#666; margin-top:50px; display:none;">此分類暫無題目。</div>
</div>

<div id="view-workspace">
    <div class="ws-header">
        <div style="display:flex; align-items:center; gap:15px;">
            <span id="wsTitle" style="font-weight:bold; font-size:1.5rem;">題目</span>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-ai" onclick="openAIHelperModal()">🤖 AI 診斷</button>
            <button class="header-btn btn-sm" onclick="goToAdmin()">⚙️ 設定</button>
        </div>
    </div>
    <div class="ws-container">
        <div class="pane-left"><div id="wsDesc" class="problem-content"></div></div>
        <div class="pane-right" id="paneRight">
            <div style="padding:8px 15px; background:#252526; display:flex; gap:10px; align-items:center;">
                <select id="langSelect" onchange="changeWorkspaceLang()">
                    <option value="cpp">C++</option>
                    <option value="python">Python 3</option>
                </select>
                <div style="flex:1;"></div>
                <button class="btn btn-success btn-sm" id="runBtn" onclick="runCode()">▶️ 執行測試</button>
            </div>
            <div id="editor"></div>
            <div class="resizer-bar" id="dragHandle"><div class="resizer-icon"></div></div>
            <div class="console-area" id="consoleArea">
                <div class="console-header">執行結果 (Output)</div>
                <div id="outputLogs"></div>
            </div>
        </div>
    </div>
</div>

<div id="view-admin">
    <div class="admin-toolbar">
        <h2 style="margin:0;">⚙️ 題目設定</h2>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-outline header-btn" onclick="openHistoryModal()">📜 執行紀錄</button>
            <button class="btn btn-warning" onclick="openModelAnswerUI()">🔑 示範解答</button>
            <button class="btn btn-primary" onclick="saveAdminAndBack()">💾 儲存並返回</button>
        </div>
    </div>
    <div class="admin-content-wrapper">
        <div class="admin-col-left">
            <h3 style="margin-top:0; color:var(--accent);">基本資訊</h3>
            <label class="admin-label">題目名稱</label>
            <input type="text" id="editTitle" style="margin-bottom:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                <label class="admin-label" style="margin:0;">題目描述 </label>
                <div>
                    <input type="file" id="localImgInput" accept="image/*" style="display:none" onchange="handleLocalImageUpload()">
                    <button class="btn btn-outline btn-sm" style="border-color:#999;" onclick="insertImageURL()">🔗 連結</button>
                    <button class="btn btn-outline btn-sm" style="border-color:#999;" onclick="document.getElementById('localImgInput').click()">📂 上傳</button>
                </div>
            </div>
            <textarea id="editDesc" style="flex:1; resize:none;" placeholder="在此輸入題目內容..."></textarea>
        </div>
        <div class="admin-col-right">
            <div class="admin-row-top" id="adminRowTop">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                    <label class="admin-label" style="color:var(--success); margin:0;">Code Template (預設程式碼)</label>
                    <select id="adminLangSelect" style="padding:2px 5px; height:auto;" onchange="changeAdminLang()">
                        <option value="cpp">編輯 C++ 模板</option>
                        <option value="python">編輯 Python 3 模板</option>
                    </select>
                </div>
                <textarea id="editTemplate" style="flex:1; resize:none; font-family:'Consolas',monospace;" spellcheck="false"></textarea>
            </div>
            <div class="resizer-bar" id="adminDragHandle"><div class="resizer-icon"></div></div>
            <div class="admin-row-bottom" id="adminRowBottom">
                <div class="admin-header-row">
                    <span class="admin-label" style="color:#aaa; margin:0;">測試資料 (每行代表一筆輸入/輸出)</span>
                    <button class="btn btn-outline btn-sm" onclick="addTestCaseUI()">+ 新增</button>
                </div>
                <div id="adminTestCases"></div>
            </div>
        </div>
    </div>
</div>

<div id="updateToast">
    <div style="display:flex; flex-direction:column; gap:5px;">
        <span style="font-weight: bold; font-size: 1.1rem;">📢 偵測到題庫更新！</span>
        <span style="font-size: 0.85rem; opacity: 0.9;">老師已發布新題目，是否立即同步？</span>
    </div>
    <button class="btn" style="background: white; color: #1e3a8a; font-weight: bold; padding: 10px 20px;" onclick="applyUpdate()">同步更新</button>
</div>

<div id="modelAnswerModal" class="modal">
    <div class="modal-box" style="width:600px; max-width:90%; height:500px;">
        <h3>🔑 設定示範解答</h3>
        <textarea id="modelAnswerInput" style="flex:1; resize:none; font-family:'Consolas',monospace; background:#1e1e1e; color:#d4d4d4; padding:10px;"></textarea>
        <div style="display:flex; justify-content:flex-end; margin-top:10px; gap:10px;">
            <button class="btn btn-outline" onclick="document.getElementById('modelAnswerModal').style.display='none'">取消</button>
            <button class="btn btn-primary" onclick="saveModelAnswerFromModal()">✅ 暫存設定</button>
        </div>
    </div>
</div>

<div id="aiHelperModal" class="modal">
    <div class="modal-box" style="width:600px; max-width:90%; height:550px;">
        <h3 style="color:var(--ai-color); margin-top:0;">🤖 AI 程式碼診斷</h3>
        <p style="color:#aaa; font-size:0.9rem; margin-top:-5px;">您可以選擇僅複製文字，或複製並開啟新分頁。</p>
        <textarea id="aiPromptOutput" style="flex:1; resize:none; font-family:'Consolas',monospace; background:#1e1e1e; color:#d4d4d4; padding:10px; font-size:0.9rem;" readonly></textarea>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:15px;">
            <button class="btn btn-outline" onclick="document.getElementById('aiHelperModal').style.display='none'">關閉</button>
            <button class="btn btn-ai" onclick="copyPromptAndOpenGemini()">🚀 複製並前往 Gemini</button>
        </div>
    </div>
</div>

<div id="historyModal" class="modal">
    <div class="modal-box" style="width:800px; max-width:95%; height:600px;">
        <h3 style="margin-top:0;">📜 歷史執行紀錄</h3>
        <div style="display:flex; flex:1; gap:15px; overflow:hidden;">
            <div style="flex:1; overflow-y:auto; background:#121212; border-radius:6px; min-width:200px;" id="historyList"></div>
            <div style="flex:2; display:flex; flex-direction:column;">
                <textarea id="historyCodeView" style="flex:1; resize:none; font-family:'Consolas',monospace; background:#1e1e1e; color:#ccc; padding:10px;" readonly></textarea>
            </div>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:15px; flex-shrink:0;">
            <button class="btn btn-danger" onclick="clearProblemHistory()">🗑️ 清空此題紀錄</button>
            <button class="btn btn-outline" onclick="document.getElementById('historyModal').style.display='none'">關閉</button>
        </div>
    </div>
</div>

<script>
    // =========================================================
    // 0. 全域變數 & 樂觀預先載入 (Optimistic Eager Load)
    // =========================================================
    let db = { categories: [], problems: [] };
    let executionHistories = {}; 
    let currentBankName = ""; 
    let currentBankUrl = ""; 
    let currentView = 'view-login';
    let pendingUpdateDb = null; 

    // 極速外掛：在 Firebase 連線前，先從瀏覽器暫存抓取上一秒的資料
    const localData = localStorage.getItem('oj_v15_data');
    if (localData) { try { db = JSON.parse(localData); } catch(e){} }
    const localHistory = localStorage.getItem('oj_v15_history');
    if (localHistory) { try { executionHistories = JSON.parse(localHistory); } catch(e){} }
    const localBankName = localStorage.getItem('oj_v15_bank_name');
    if (localBankName) currentBankName = localBankName;
    const localBankUrl = localStorage.getItem('oj_v15_bank_url');
    if (localBankUrl) currentBankUrl = localBankUrl;

    // ==========================================
    // 1. Firebase 核心設定
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyD_DeIkusZN7r92UNE_yrR509IC_ZCa21U",
        authDomain: "program-system-1a17b.firebaseapp.com",
        projectId: "program-system-1a17b",
        storageBucket: "program-system-1a17b.firebasestorage.app",
        messagingSenderId: "278539071308",
        appId: "1:278539071308:web:eac59d0bf1c2e40a0f29e9",
        measurementId: "G-N23Z373WW7"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const firestore = firebase.firestore();
    let currentUser = null;

    // === 登入邏輯 ===
    function loginWithEmail() {
        const email = document.getElementById('emailInput').value.trim();
        const pwd = document.getElementById('passwordInput').value;
        auth.signInWithEmailAndPassword(email, pwd).catch(err => alert("登入失敗：" + err.message));
    }
    function registerWithEmail() {
        const email = document.getElementById('emailInput').value.trim();
        const pwd = document.getElementById('passwordInput').value;
        if(pwd.length < 6) { alert("密碼需至少 6 個字元"); return; }
        auth.createUserWithEmailAndPassword(email, pwd).then(() => alert("註冊成功！")).catch(err => alert("註冊失敗：" + err.message));
    }
    function logout() {
        if(confirm("確定要登出嗎？")) {
            auth.signOut().then(() => {
                localStorage.clear();
                window.location.href = window.location.href.split('?')[0]; 
            });
        }
    }

    // ==========================================
    // 2. 初始化與極速畫面渲染
    // ==========================================
    let editor = null;
    let currentFontSize = 16;

    window.onload = function() {
        editor = ace.edit("editor");
        editor.setTheme("ace/theme/twilight");
        editor.session.setMode("ace/mode/c_cpp");
        editor.setFontSize(currentFontSize);
        editor.setShowPrintMargin(false);
        window.addEventListener('popstate', handlePopState);
        initResizer();
        initAdminResizer(); 

        // 🚀 關鍵優化：如果是新分頁，立刻用暫存資料畫出作答區，不用等 Firebase！
        const urlParams = new URLSearchParams(window.location.search);
        const probIdParam = urlParams.get('probId');
        
        if (probIdParam && db.problems && db.problems.length > 0) {
            _enterWorkspaceInternal(probIdParam, false);
        }
    };

    // === 雲端同步 ===
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            // 登入後才在背景默默跟雲端對資料
            loadUserDataFromCloud();
        } else {
            // 沒登入才顯示登入畫面
            showView('view-login');
        }
    });

    async function loadUserDataFromCloud() {
        if (!currentUser) return;
        try {
            const docSnap = await firestore.collection('users').doc(currentUser.uid).get();
            if (docSnap.exists) {
                const data = docSnap.data();
                if (data.dbData) db = JSON.parse(data.dbData);
                if (data.historyData) executionHistories = JSON.parse(data.historyData);
                if (data.bankName) currentBankName = data.bankName;
                if (data.bankUrl) currentBankUrl = data.bankUrl;
            }
            
            // 如果已經「預先載入」了作答區，就不要切換畫面打擾使用者
            if (currentView !== 'view-workspace') {
                checkUrlAndLoad();
            }
            
            // 啟動自動偵測更新
            checkForUpdates(); 
        } catch (e) { 
            if (currentView !== 'view-workspace') checkUrlAndLoad();
        }
    }

    // 🚀 優化 C：背景非同步存檔 (Fire-and-Forget)，不阻擋畫面
    async function saveToLocal() { 
        if (!currentUser) return;
        const dataString = JSON.stringify(db);
        const historyString = JSON.stringify(executionHistories);
        localStorage.setItem('oj_v15_data', dataString);
        localStorage.setItem('oj_v15_history', historyString);
        try {
            await firestore.collection('users').doc(currentUser.uid).set({
                dbData: dataString,
                historyData: historyString,
                bankName: currentBankName,
                bankUrl: currentBankUrl,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error("背景存檔失敗", e); }
    }

    // === 核心偵測更新邏輯 (全自動 ID 比對) ===
    async function checkForUpdates() {
        if (!currentBankUrl) return; 
        try {
            const res = await fetch(currentBankUrl + '?t=' + new Date().getTime());
            if (res.ok) {
                const cloudDb = await res.json();
                const localIds = db.problems.map(p => p.id).sort().join(',');
                const cloudIds = cloudDb.problems.map(p => p.id).sort().join(',');

                if (db.problems.length !== cloudDb.problems.length || localIds !== cloudIds) {
                    pendingUpdateDb = cloudDb;
                    document.getElementById('updateToast').style.display = 'flex';
                }
            }
        } catch (e) { console.error("自動更新偵測失敗", e); }
    }

    async function applyUpdate() {
        if (!pendingUpdateDb) return;
        const newDb = pendingUpdateDb;
        
        newDb.problems.forEach(newP => {
            const oldP = db.problems.find(p => p.id === newP.id);
            if (oldP) {
                if (oldP.code_cpp !== undefined) newP.code_cpp = oldP.code_cpp;
                if (oldP.code_python !== undefined) newP.code_python = oldP.code_python;
                if (oldP.lastLang !== undefined) newP.lastLang = oldP.lastLang;
            }
        });
        
        db = newDb;
        saveToLocal(); // 背景非同步存檔
        document.getElementById('updateToast').style.display = 'none';
        alert("✅ 題庫同步完成！已為您載入最新題目。");
        location.reload(); 
    }

    // === 題庫載入 ===
    async function fetchAndLoadBank(url, name) {
        try {
            const res = await fetch(url + '?t=' + new Date().getTime());
            if (res.ok) {
                db = await res.json();
                currentBankUrl = url;
                currentBankName = name;
                saveToLocal(); // 瞬間觸發，不阻擋
                location.reload();
            }
        } catch (e) { alert("題庫載入失敗"); }
    }

    function showView(viewId) {
        currentView = viewId;
        ['view-login', 'view-portal', 'view-categories', 'view-problem-list', 'view-workspace', 'view-admin'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.style.display = 'none';
        });
        const target = document.getElementById(viewId);
        if(target) target.style.display = (viewId === 'view-categories' || viewId === 'view-problem-list') ? 'block' : 'flex';
        if(viewId === 'view-workspace' && editor) setTimeout(() => editor.resize(), 50);
    }

    // 路由控制
    function checkUrlAndLoad() {
        const probId = new URLSearchParams(window.location.search).get('probId');
        if (probId) {
            _enterWorkspaceInternal(probId, false);
        } else if (db.categories.length > 0) {
            renderCategoryList();
            showView('view-categories');
        } else {
            showView('view-portal');
        }
    }

    function backToPortal() { history.pushState({ view: 'portal' }, '', window.location.pathname); showView('view-portal'); }
    function backToCategories() { history.pushState({ view: 'categories' }, '', window.location.pathname); showView('view-categories'); }
    function backToProblemList() { history.pushState({ view: 'problem-list', catId: currentCatId }, '', window.location.pathname); showView('view-problem-list'); }

    // === 解題系統核心 UI 操作 ===
    let currentCatId = null;
    let currentProbId = null;
    let isCatSortMode = false;
    let isProbSortMode = false;
    let adminTempTemplates = { cpp: "", python: "" };
    let currentAdminLang = 'cpp';

    function handlePopState(event) {
        if (!currentUser) return; 
        const state = event.state;
        const goingTo = state ? state.view : 'portal';
        if (goingTo === 'portal') { showView('view-portal'); }
        else if (goingTo === 'categories') { currentCatId = null; renderCategoryList(); showView('view-categories'); } 
        else if (goingTo === 'problem-list') { currentCatId = state.catId; renderProblemList(); showView('view-problem-list'); } 
        else if (goingTo === 'workspace') { currentProbId = state.probId; _enterWorkspaceInternal(state.probId, true); } 
        else if (goingTo === 'admin') { currentProbId = state.probId; _goToAdminInternal(); }
    }

    function resetCurrentBank() {
        if (!currentBankUrl) return;
        if (confirm("⚠️ 警告：這將會清除您目前所有的代碼與設定，重新下載乾淨題庫！\n(您的歷史執行紀錄依然會被保留)")) {
            fetchAndLoadBank(currentBankUrl, currentBankName, true); 
        }
    }

    function hardResetAll() {
        if (confirm("⚠️ 警告：這將會清除所有資料，讓系統回到完全空白狀態！確定嗎？")) {
            db = { categories: [], problems: [] };
            currentBankName = "自訂新題庫 (空白)";
            currentBankUrl = "";
            saveToLocal(); // 背景存檔
            location.reload();
        }
    }

    function initResizer() {
        const handle = document.getElementById('dragHandle'); const consoleArea = document.getElementById('consoleArea');
        const paneRight = document.getElementById('paneRight'); const editorDiv = document.getElementById('editor');
        handle.addEventListener('mousedown', function(e) {
            e.preventDefault(); document.body.classList.add('resizing'); editorDiv.style.pointerEvents = 'none';
            const startY = e.clientY; const startHeight = consoleArea.offsetHeight; const paneHeight = paneRight.offsetHeight;
            function doDrag(e) {
                const deltaY = startY - e.clientY; let newHeight = startHeight + deltaY;
                if (newHeight < 40) newHeight = 40; if (newHeight > paneHeight - 100) newHeight = paneHeight - 100;
                consoleArea.style.height = newHeight + 'px'; editor.resize();
            }
            function stopDrag() { document.removeEventListener('mousemove', doDrag); document.removeEventListener('mouseup', stopDrag); document.body.classList.remove('resizing'); editorDiv.style.pointerEvents = 'auto'; }
            document.addEventListener('mousemove', doDrag); document.addEventListener('mouseup', stopDrag);
        });
    }

    function initAdminResizer() {
        const handle = document.getElementById('adminDragHandle'); const bottomArea = document.getElementById('adminRowBottom');
        handle.addEventListener('mousedown', function(e) {
            e.preventDefault(); document.body.classList.add('resizing');
            const startHeight = bottomArea.offsetHeight; bottomArea.style.flex = 'none'; bottomArea.style.height = startHeight + 'px'; 
            const startY = e.clientY;
            function doDrag(e) { const deltaY = startY - e.clientY; let newHeight = startHeight + deltaY; if (newHeight < 100) newHeight = 100; bottomArea.style.height = newHeight + 'px'; }
            function stopDrag() { document.removeEventListener('mousemove', doDrag); document.removeEventListener('mouseup', stopDrag); document.body.classList.remove('resizing'); }
            document.addEventListener('mousemove', doDrag); document.addEventListener('mouseup', stopDrag);
        });
    }

    function openCategory(id) { 
        history.pushState({ view: 'problem-list', catId: id }, '', window.location.pathname); 
        currentCatId = id; 
        renderProblemList(); 
        showView('view-problem-list'); 
    }

    function _enterWorkspaceInternal(id, fromAdmin = false) {
        currentProbId = id;
        const p = db.problems.find(x => x.id === id);
        if (!p) return;
        
        if (p.tpl_cpp === undefined) p.tpl_cpp = p.templateCode || "#include <iostream>\nusing namespace std;\n\nint main() {\n    return 0;\n}";
        if (p.tpl_python === undefined) p.tpl_python = "def main():\n    pass\n\nif __name__ == '__main__':\n    main()";
        
        // 若為全新開啟的分頁 (fromAdmin = false)，確保回到乾淨模板
        if (!fromAdmin) { 
            p.code_cpp = p.tpl_cpp; 
            p.code_python = p.tpl_python; 
        } 
        
        document.getElementById('wsTitle').innerText = p.title;
        document.getElementById('wsDesc').innerHTML = parseContent(p.desc || "");
        const lang = p.lastLang || 'cpp'; document.getElementById('langSelect').value = lang; 
        
        if (lang === 'cpp') { editor.session.setMode("ace/mode/c_cpp"); editor.setValue(p.code_cpp, -1); } 
        else if (lang === 'python') { editor.session.setMode("ace/mode/python"); editor.setValue(p.code_python, -1); }
        
        document.getElementById('outputLogs').innerHTML = '<div style="color:#666;">等待執行...</div>';
        showView('view-workspace');
    }

    // 🚀 恢復 A 功能：點擊題目開啟「新分頁」，同時保有瞬間載入能力
    function renderProblemList() {
        const cat = db.categories.find(c => c.id === currentCatId);
        document.getElementById('currentCatTitle').innerText = cat ? cat.name : "分類題庫";
        const container = document.getElementById('probListContainer');
        container.innerHTML = '';
        const catProblems = db.problems.filter(p => p.catId === currentCatId);
        
        if (catProblems.length === 0) { 
            document.getElementById('emptyMsg').style.display = 'block'; 
        } else {
            document.getElementById('emptyMsg').style.display = 'none';
            catProblems.forEach(p => {
                const item = document.createElement('div');
                item.className = 'prob-item'; item.dataset.id = p.id;
                
                // 開啟新分頁
                item.onclick = (e) => { 
                    if(!isProbSortMode && !e.target.closest('button')) {
                        const baseUrl = window.location.href.split('?')[0];
                        window.open(`${baseUrl}?probId=${p.id}`, '_blank');
                    } 
                };

                item.innerHTML = `
                    <div style="flex:1; overflow:hidden;">
                        <div class="prob-title">${p.title}</div><div class="prob-desc-preview">${p.desc.substring(0, 50)}...</div>
                    </div>
                    <div class="prob-actions">
                        <button class="prob-btn-icon prob-edit-btn" onclick="editProblemInList(event, '${p.id}')">✏️</button>
                        <button class="prob-btn-icon prob-del-btn" onclick="deleteProblemInList(event, '${p.id}')">🗑️</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }
    }

    function createCategory() { const name = prompt("新分類名稱："); if(name) { db.categories.push({ id: Date.now().toString(), name: name }); saveToLocal(); renderCategoryList(); } }
    function editCategory(e, id) { e.stopPropagation(); const cat = db.categories.find(c => c.id === id); const newName = prompt("修改名稱：", cat.name); if(newName) { cat.name = newName; saveToLocal(); renderCategoryList(); } }
    function deleteCategory(e, id) { e.stopPropagation(); if(confirm("確定刪除？")) { db.categories = db.categories.filter(c => c.id !== id); db.problems = db.problems.filter(p => p.catId !== id); saveToLocal(); renderCategoryList(); } }
    
    function createProblemInCat() { 
        const title = prompt("題目名稱："); 
        if(title) { 
            db.problems.push({ 
                id: Date.now().toString(), catId: currentCatId, title: title, desc: "請輸入題目描述...", 
                tpl_cpp: "#include <iostream>\nusing namespace std;\n\nint main() {\n    return 0;\n}", 
                tpl_python: "def main():\n    pass\n\nif __name__ == '__main__':\n    main()",
                testCases: [{ input: "1 2", output: "3" }], lastLang: 'cpp' 
            }); 
            saveToLocal(); renderProblemList(); 
        } 
    }
    
    function editProblemInList(e, id) { e.stopPropagation(); currentProbId = id; goToAdmin(); }
    function deleteProblemInList(e, id) { e.stopPropagation(); if(confirm("確定刪除？")) { db.problems = db.problems.filter(p => p.id !== id); saveToLocal(); renderProblemList(); } }

    function renderCategoryList() {
        const container = document.getElementById('groupedCategoryContainer'); container.innerHTML = '';
        const grid = document.createElement('div'); grid.className = 'cat-grid';
        db.categories.forEach(cat => {
            const probCount = db.problems.filter(p => p.catId === cat.id).length;
            const card = document.createElement('div'); card.className = 'cat-card'; card.dataset.id = cat.id;
            card.innerHTML = `<div class="cat-title">${cat.name}</div><div class="cat-count">${probCount} 題</div><div class="cat-actions"><button class="btn btn-outline btn-sm" onclick="editCategory(event, '${cat.id}')">✏️</button><button class="btn btn-outline btn-sm" onclick="deleteCategory(event, '${cat.id}')" style="color:#f44747; border-color:#f44747;">🗑️</button></div>`;
            card.onclick = (e) => { if(!e.target.closest('button')) openCategory(cat.id); };
            grid.appendChild(card);
        });
        container.appendChild(grid);
    }

    function changeWorkspaceLang() { 
        const p = db.problems.find(x => x.id === currentProbId); 
        const oldLang = p.lastLang || 'cpp';
        p['code_' + oldLang] = editor.getValue(); 
        const newLang = document.getElementById('langSelect').value; 
        p.lastLang = newLang; 
        if (newLang === 'cpp') { editor.session.setMode("ace/mode/c_cpp"); editor.setValue(p.code_cpp, -1); } 
        else if (newLang === 'python') { editor.session.setMode("ace/mode/python"); editor.setValue(p.code_python, -1); }
    }

    function parseContent(text) {
        if (!text) return ""; let escaped = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        const imageRegex = /!\[(.*?)\]\((.*?)\)/g; let html = escaped.replace(imageRegex, (match, alt, url) => { return `<img src="${url}" alt="${alt}">`; }); return html.replace(/\n/g, "<br>");
    }

    function resetCode() { 
        if(!confirm("重置程式碼到初始模板？")) return; 
        const p = db.problems.find(x => x.id === currentProbId); const lang = document.getElementById('langSelect').value;
        if (lang === 'cpp') { p.code_cpp = p.tpl_cpp; editor.setValue(p.code_cpp, -1); } 
        else { p.code_python = p.tpl_python; editor.setValue(p.code_python, -1); }
    }
    
    function adjustFontSize(change) { currentFontSize += change; editor.setFontSize(currentFontSize); }
    
    function goToAdmin() { 
        const lang = document.getElementById('langSelect').value;
        const p = db.problems.find(x => x.id === currentProbId);
        if(p) p['code_' + lang] = editor.getValue(); 
        
        // 使用 SPA 模式進入設定頁，保證速度且在同一個分頁
        history.pushState({ view: 'admin', probId: currentProbId }, '', window.location.pathname + window.location.search); 
        _goToAdminInternal(); 
    }

    function _goToAdminInternal() {
        const p = db.problems.find(x => x.id === currentProbId); 
        document.getElementById('editTitle').value = p.title; document.getElementById('editDesc').value = p.desc; 
        adminTempTemplates.cpp = p.tpl_cpp; adminTempTemplates.python = p.tpl_python;
        document.getElementById('adminLangSelect').value = 'cpp'; currentAdminLang = 'cpp';
        document.getElementById('editTemplate').value = adminTempTemplates.cpp;
        const c = document.getElementById('adminTestCases'); c.innerHTML = ''; 
        (p.testCases || []).forEach(tc => addTestCaseUI(tc.input, tc.output)); 
        showView('view-admin'); 
    }

    function changeAdminLang() {
        const newLang = document.getElementById('adminLangSelect').value; const currentText = document.getElementById('editTemplate').value;
        adminTempTemplates[currentAdminLang] = currentText; currentAdminLang = newLang; document.getElementById('editTemplate').value = adminTempTemplates[newLang];
    }

    function addTestCaseUI(input='', output='') {
        const div = document.createElement('div'); div.className = 'tc-item';
        div.innerHTML = `<button class="btn btn-outline" style="float:right; border:none; padding:0 5px;" onclick="this.parentElement.remove()">✕</button><div style="display:flex; gap:10px; margin-top:5px;"><textarea class="tc-input" rows="1" style="flex:1" placeholder="Input">${input}</textarea><textarea class="tc-output" rows="1" style="flex:1" placeholder="Output">${output}</textarea></div>`;
        document.getElementById('adminTestCases').appendChild(div);
    }

    // 🚀 優化 C：取消 await，按下按鈕瞬間跳轉回作答區，資料在背景慢慢存
    function saveAdminAndBack() { 
        const p = db.problems.find(x => x.id === currentProbId); 
        p.title = document.getElementById('editTitle').value; p.desc = document.getElementById('editDesc').value; 
        adminTempTemplates[currentAdminLang] = document.getElementById('editTemplate').value;
        p.tpl_cpp = adminTempTemplates.cpp; p.tpl_python = adminTempTemplates.python;
        const inputs = document.querySelectorAll('.tc-input'); const outputs = document.querySelectorAll('.tc-output'); 
        p.testCases = []; for(let i=0; i<inputs.length; i++) p.testCases.push({ input: inputs[i].value, output: outputs[i].value }); 
        
        // 觸發背景存檔，不阻擋畫面
        saveToLocal(); 
        
        // 瞬間返回作答區
        history.back();
    }

    async function runCode() {
        const p = db.problems.find(x => x.id === currentProbId); 
        if(!p.testCases || p.testCases.length === 0) { alert("無測資"); return; }
        
        const btn = document.getElementById('runBtn'); const logs = document.getElementById('outputLogs'); 
        const code = editor.getValue(); const lang = document.getElementById('langSelect').value; 
        btn.disabled = true; btn.innerText = "..."; logs.innerHTML = '';
        
        let passCount = 0; let isCompileError = false;

        for(let i=0; i<p.testCases.length; i++) {
            const tempDiv = document.createElement('div'); tempDiv.className = 'log-case'; tempDiv.innerHTML = `<span style="color:yellow">Case ${i+1}: Running...</span>`; logs.appendChild(tempDiv); tempDiv.scrollIntoView({ behavior: "smooth", block: "end" });

            try {
                let act = ""; let exp = (p.testCases[i].output || "").trim(); let inputData = p.testCases[i].input || "";
                const apiCompiler = lang === 'cpp' ? 'gcc-head' : 'cpython-head';
                const res = await fetch('https://wandbox.org/api/compile.json', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ compiler: apiCompiler, code: code, stdin: inputData }) }).then(r => r.json());
                
                if (res.compiler_error || res.compiler_message) {
                    tempDiv.innerHTML = `<div class="log-header" style="color:var(--fail)">❌ Case ${i+1}: 編譯錯誤</div><div class="log-details"><pre style="color:#f44747; margin:0;">${res.compiler_error || res.compiler_message}</pre></div>`;
                    isCompileError = true; break; 
                }
                if (res.status !== "0" && res.program_error) {
                      tempDiv.innerHTML = `<div class="log-header" style="color:var(--fail)">❌ Case ${i+1}: 執行錯誤</div><div class="log-details"><pre style="color:#f44747; margin:0;">${res.program_error}</pre></div>`;
                      continue; 
                }
                act = (res.program_message || "").trim();

                let pass = act.replace(/\r\n/g, "\n") === exp.replace(/\r\n/g, "\n");
                if (pass) passCount++;
                let statusHtml = pass ? `<span style="color:var(--success)">✅ Case ${i+1}: 通過測試 (Accepted)</span>` : `<span style="color:var(--fail)">❌ Case ${i+1}: 答案錯誤 (Wrong Answer)</span>`;
                tempDiv.innerHTML = `<div class="log-header">${statusHtml}</div><div class="log-details"><div class="log-label">輸入:</div><div class="log-value">${inputData}</div><div class="log-label">預期輸出:</div><div class="log-value">${exp}</div><div class="log-label">您的輸出:</div><div class="log-value">${act || "(無輸出)"}</div></div>`;

            } catch(e) { 
                tempDiv.innerHTML = `<div style="color:var(--fail)">❌ Case ${i+1}: 網路連線錯誤</div>`; 
                isCompileError = true; break;
            }
        }

        let finalStatus = isCompileError ? `<span style="color:var(--fail)">❌ 編譯或連線失敗</span>` : (passCount === p.testCases.length ? `<span style="color:var(--success)">✅ 全數通過 (${passCount}/${p.testCases.length})</span>` : `<span style="color:var(--warning)">⚠️ 部分通過 (${passCount}/${p.testCases.length})</span>`);

        if (!executionHistories[currentProbId]) executionHistories[currentProbId] = [];
        executionHistories[currentProbId].unshift({ time: new Date().toLocaleString('zh-TW', { hour12: false }), lang: lang, code: code, status: finalStatus });
        if (executionHistories[currentProbId].length > 30) executionHistories[currentProbId].pop();
        
        saveToLocal(); // 背景非同步存檔，不卡按鈕
        btn.disabled = false; btn.innerText = "▶️ 執行測試";
    }

    function openHistoryModal() {
        const histList = executionHistories[currentProbId] || [];
        const listDiv = document.getElementById('historyList'); 
        document.getElementById('historyCodeView').value = ""; 
        listDiv.innerHTML = "";
        
        if (histList.length === 0) {
            listDiv.innerHTML = "<div style='color:#666; text-align:center; padding:30px;'>尚無執行紀錄</div>";
        } else {
            histList.forEach((hist, idx) => {
                const item = document.createElement('div'); item.className = 'hist-item';
                item.onclick = () => { document.querySelectorAll('.hist-item').forEach(el => el.classList.remove('active')); item.classList.add('active'); document.getElementById('historyCodeView').value = hist.code; };
                item.innerHTML = `<div style="font-size:0.85rem; color:#aaa;">${hist.time} <span style="color:var(--accent)">[${hist.lang}]</span></div><div style="margin-top:5px; font-weight:bold;">${hist.status}</div>`;
                listDiv.appendChild(item);
                if (idx === 0) item.click();
            });
        }
        document.getElementById('historyModal').style.display = 'flex';
    }

    function clearProblemHistory() {
        if (!confirm("確定要清空這題的紀錄嗎？")) return;
        executionHistories[currentProbId] = []; 
        saveToLocal(); 
        openHistoryModal();
    }

    function openModelAnswerUI() { const p = db.problems.find(x => x.id === currentProbId); document.getElementById('modelAnswerInput').value = p.modelAnswer || ""; document.getElementById('modelAnswerModal').style.display = 'flex'; }
    function saveModelAnswerFromModal() { const p = db.problems.find(x => x.id === currentProbId); p.modelAnswer = document.getElementById('modelAnswerInput').value; document.getElementById('modelAnswerModal').style.display = 'none'; saveToLocal(); }

    function openAIHelperModal() {
        const p = db.problems.find(x => x.id === currentProbId); const code = editor.getValue();
        if (!code || code.trim() === "") { alert("程式碼為空，無法分析。"); return; }
        document.getElementById('aiPromptOutput').value = `請幫我檢查以下程式碼邏輯（繁體中文）：\n\n【題目】：${p.title}\n【描述】：\n${p.desc}\n\n【程式碼】：\n\`\`\`${document.getElementById('langSelect').value}\n${code}\n\`\`\``;
        document.getElementById('aiHelperModal').style.display = 'flex';
    }
    function copyPromptAndOpenGemini() { document.getElementById('aiPromptOutput').select(); document.execCommand('copy'); window.open('https://gemini.google.com/app', '_blank'); document.getElementById('aiHelperModal').style.display = 'none'; }
    function insertImageURL() { const url = prompt("圖片 URL：", "https://"); if (url) document.getElementById('editDesc').value += `\n![圖片](${url})\n`; }
</script>
